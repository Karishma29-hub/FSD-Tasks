<!DOCTYPE html>
<html>
<head>
    <title>Alert Message</title>
    <style>
        body {
            background-color: #E68775;
            text-align: center;
            font-family: Arial, sans-serif;
            padding-top: 100px;
        }

        h2 {
            color: black;
            font-size: 30px;
        }

        button {
            background-color: darkgreen;
            color: white;
            font-size: 18px;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: green;
        }
    </style>
</head>
<body>

    <h2>Travel Booking</h2>
    <button onclick="showMessage()">Click Here</button>

    <script>
        function showMessage() {
            alert("Your booking is confirmed");
        }
    </script>

</body>
</html>
