<!DOCTYPE html>
<html>
<head>
    <title>Change Text using DOM</title>
    <style>
        body {
            background-color: #E68775;
            text-align: center;
            font-family: Arial, sans-serif;
            padding-top: 100px;
        }

        h2 {
            color: Black;
            font-size: 30px;
        }

        button {
            background-color: lightblue;
            color: black;
            font-size: 18px;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: green;
        }
    </style>
</head>
<body>

    <h2 id="message">Welcome to Travel World</h2>

    <button onclick="changeText()">Click Here</button>

    <script>
        function changeText() {
            document.getElementById("message").innerHTML = "Enjoy Your Vacation!";
        }
    </script>

</body>
</html>
