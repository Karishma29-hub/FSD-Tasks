<!DOCTYPE html>
<html>
<head>
    <title>Travel Package Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #dbeafe, #bfdbfe);
            margin: 0;
            padding: 40px;
        }

        .table-box {
            text-align: center;
            width: 100%;
            max-width: 700px;
            margin: auto;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background-color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background: linear-gradient(to right, #166534, #14532d);
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <div class="table-box">
        <h2 style="color: darkblue; font-size: 32px; margin-bottom: 10px;">
            Travel Package Details
        </h2>

        <p style="color: darkgreen; font-size: 20px; margin-bottom: 20px;">
            Explore exciting destinations and choose the best travel package for your next vacation.
        </p>

        <table>
            <tr>
                <th>Package ID</th>
                <th>Destination</th>
                <th>Days</th>
                <th>Price</th>
            </tr>
            <tr>
                <td>01</td>
                <td>Goa</td>
                <td>3 Days</td>
                <td>₹12,000</td>
            </tr>
            <tr>
                <td>02</td>
                <td>Ooty</td>
                <td>4 Days</td>
                <td>₹15,000</td>
            </tr>
            <tr>
                <td>03</td>
                <td>Manali</td>
                <td>5 Days</td>
                <td>₹20,000</td>
            </tr>
        </table>
    </div>

</body>
</html>
