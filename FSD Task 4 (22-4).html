<!DOCTYPE html>
<html>
<head>
    <title>Travel Package Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #dbeafe, #bfdbfe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .table-box {
            text-align: center;
        }

        h2 {
            color: #1e3a8a;
            margin-bottom: 15px;
        }

        table {
            border-collapse: collapse;
            width: 500px;
            background-color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        th {
    background: linear-gradient(to right, #166534, #14532d);
    color: white;
    padding: 12px;
}

        td {
            padding: 10px;
            text-align: center;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <div class="table-box">
        <h2>Travel Package Details</h2>

        <table>
            <tr>
                <th>Package ID</th>
                <th>Destination</th>
                <th>Days</th>
                <th>Price</th>
            </tr>
            <tr>
                <td>01</td>
                <td>Goa</td>
                <td>3 Days</td>
                <td>₹12,000</td>
            </tr>
            <tr>
                <td>02</td>
                <td>Ooty</td>
                <td>4 Days</td>
                <td>₹15,000</td>
            </tr>
            <tr>
                <td>03</td>
                <td>Manali</td>
                <td>5 Days</td>
                <td>₹20,000</td>
            </tr>
        </table>
    </div>

</body>
</html>
